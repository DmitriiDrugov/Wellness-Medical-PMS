<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>

                    },

                    "spacing": {

                        "grid-gutter": "20px",

<body class="bg-surface min-h-screen flex items-center justify-center p-6 text-on-surface antialiased relative overflow-hidden">
<!-- Abstract ambient background elements to enhance the Spa-Clinic aesthetic without overwhelming -->
<div class="absolute top-[-10%] left-[-5%] w-[40vw] h-[40vw] rounded-full bg-primary-fixed/20 blur-[120px] pointer-events-none z-0"></div>
<div class="absolute bottom-[-10%] right-[-5%] w-[50vw] h-[50vw] rounded-full bg-secondary-fixed/30 blur-[150px] pointer-events-none z-0"></div>
<!-- Login Container -->
<div class="w-full max-w-[440px] bg-surface-container-lowest rounded-xl shadow-[0px_4px_20px_rgba(62,142,132,0.05)] p-container-padding flex flex-col gap-stack-lg border border-surface-container-highest z-10 relative">
<!-- Brand Header -->
<div class="text-center flex flex-col gap-stack-sm items-center">
<div class="w-16 h-16 bg-primary-container rounded-full flex items-center justify-center mb-2 shadow-sm">
<span class="material-symbols-outlined text-on-primary-container text-3xl" style="font-variation-settings: 'FILL' 1;">spa</span>
</div>
<h1 class="font-headline-xl text-headline-xl text-primary tracking-tight">Sanctuary PMS</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Medical Wellness Administration</p>
</div>
<!-- Login Form -->
<form class="flex flex-col gap-stack-md" onsubmit="event.preventDefault();">
<!-- Email Input Group -->
<div class="flex flex-col gap-unit">
<label class="font-label-md text-label-md text-on-surface ml-1" for="email">Email Address</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline-variant group-focus-within:text-primary transition-colors z-10">mail</span>
<input class="w-full rounded-lg border border-outline-variant bg-surface pl-10 pr-4 py-3 font-body-md text-body-md text-on-surface placeholder:text-outline focus:border-primary focus:ring-2 focus:ring-primary/10 transition-all outline-none" id="email" placeholder="staff@sanctuary.clinic" type="email"/>
</div>
</div>
<!-- Password Input Group -->
<div class="flex flex-col gap-unit">
<div class="flex justify-between items-center ml-1 mb-1">
<label class="font-label-md text-label-md text-on-surface" for="password">Password</label>
<a class="font-label-md text-label-md text-primary hover:text-surface-tint transition-colors" href="#">Forgot?</a>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline-variant group-focus-within:text-primary transition-colors z-10">lock</span>
<input class="w-full rounded-lg border border-outline-variant bg-surface pl-10 pr-10 py-3 font-body-md text-body-md text-on-surface placeholder:text-outline focus:border-primary focus:ring-2 focus:ring-primary/10 transition-all outline-none" id="password" placeholder="••••••••" type="password"/>
<button aria-label="Toggle password visibility" class="absolute right-3 top-1/2 -translate-y-1/2 text-outline-variant hover:text-on-surface transition-colors focus:outline-none" type="button">
<span class="material-symbols-outlined text-[20px]">visibility_off</span>
</button>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center gap-2 mt-1 ml-1">
<input class="w-4 h-4 rounded border-outline-variant text-primary focus:ring-primary/20 bg-surface cursor-pointer" id="remember" type="checkbox"/>
<label class="font-body-sm text-body-sm text-on-surface-variant cursor-pointer select-none" for="remember">Keep me signed in</label>
</div>
<!-- Submit Action -->
<button class="w-full mt-4 bg-primary hover:bg-surface-tint text-on-primary font-label-bold text-label-bold py-3.5 px-4 rounded-lg shadow-sm transition-all active:scale-[0.98] flex items-center justify-center gap-2 group relative overflow-hidden" type="submit">
<span class="relative z-10 flex items-center gap-2">
                    Access Dashboard
                    <span class="material-symbols-outlined text-[18px] group-hover:translate-x-1 transition-transform">arrow_forward</span>
</span>
<!-- Subtle glow effect on hover -->
<div class="absolute inset-0 bg-white/10 opacity-0 group-hover:opacity-100 transition-opacity z-0"></div>
</button>
</form>
<!-- Footer Help -->
<div class="mt-4 pt-stack-md border-t border-surface-container text-center">
<p class="font-body-sm text-body-sm text-outline">
                Need assistance? <a class="text-primary hover:underline font-medium" href="#">Contact IT Support</a>
</p>
</div>
</div>
</body></html>
